name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore app dependencies
        run: dotnet restore src/WhatsAppViewer/WhatsAppViewer.csproj

      - name: Restore test dependencies
        run: dotnet restore tests/WhatsAppViewer.Tests/WhatsAppViewer.Tests.csproj

      - name: Restore Playwright test dependencies
        run: dotnet restore tests/WhatsAppViewer.Playwright.Tests/WhatsAppViewer.Playwright.Tests.csproj

      - name: Build Playwright test project (generates playwright.ps1)
        run: dotnet build tests/WhatsAppViewer.Playwright.Tests/WhatsAppViewer.Playwright.Tests.csproj --no-restore

      - name: Install Playwright browsers
        run: pwsh tests/WhatsAppViewer.Playwright.Tests/bin/Debug/net10.0/playwright.ps1 install chromium
