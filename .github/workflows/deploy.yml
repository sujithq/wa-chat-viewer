name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Run unit tests
        run: dotnet test tests/WhatsAppViewer.Tests/WhatsAppViewer.Tests.csproj --configuration Release

      - name: Build Playwright test project
        run: dotnet build tests/WhatsAppViewer.Playwright.Tests/WhatsAppViewer.Playwright.Tests.csproj --configuration Release

      - name: Build app for smoke tests
        run: dotnet build src/WhatsAppViewer/WhatsAppViewer.csproj --configuration Release

      - name: Install Playwright browser dependencies
        run: pwsh tests/WhatsAppViewer.Playwright.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start app for smoke tests
        run: |
          dotnet run --project src/WhatsAppViewer --configuration Release --no-build --urls http://localhost:5000 > app.log 2>&1 &
          for i in {1..60}; do
            if curl -sSf http://localhost:5000/index.html > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat app.log
          exit 1

      - name: Run Playwright smoke tests
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:5000
        run: dotnet test tests/WhatsAppViewer.Playwright.Tests/WhatsAppViewer.Playwright.Tests.csproj --configuration Release --settings tests/WhatsAppViewer.Playwright.Tests/playwright.runsettings --filter "TestCategory=Smoke"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WhatsAppViewer/WhatsAppViewer.csproj

      - name: Publish Blazor WASM
        run: |
          dotnet publish src/WhatsAppViewer/WhatsAppViewer.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Configure GitHub Pages base href and custom domain
        env:
          CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
        run: |
          if [ -n "$CUSTOM_DOMAIN" ]; then
            BASE_HREF="/"
            printf '%s\n' "$CUSTOM_DOMAIN" > publish/wwwroot/CNAME
          else
            BASE_HREF="/${{ github.event.repository.name }}/"
            rm -f publish/wwwroot/CNAME
          fi
          sed -i "s|<base href=\"/\" />|<base href=\"${BASE_HREF}\" />|g" publish/wwwroot/index.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404.html for client-side routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
