name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WhatsAppViewer/WhatsAppViewer.csproj

      - name: Publish Blazor WASM
        run: |
          dotnet publish src/WhatsAppViewer/WhatsAppViewer.csproj \
            -c Release \
            -o publish \
            --nologo

      - name: Fix base href for GitHub Pages
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          # Update base href to match the repository name (GitHub Pages path)
          sed -i "s|<base href=\"/\" />|<base href=\"/${REPO_NAME}/\" />|g" \
            publish/wwwroot/index.html

      - name: Add .nojekyll
        run: touch publish/wwwroot/.nojekyll

      - name: Add 404.html for client-side routing
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
